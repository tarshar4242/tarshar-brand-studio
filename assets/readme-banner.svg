    <text x="0" y="-7" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="25" font-weight="800" fill="#FFFFFF">小塔</text>
    <text x="0" y="24" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">品牌導演</text>
