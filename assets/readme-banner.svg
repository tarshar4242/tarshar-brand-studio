<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Tarshar Brand Studio</title>
  <desc id="desc">小塔品牌導演與小D靈感雷達的品牌視覺作業系統</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5FFF8"/>
      <stop offset="0.55" stop-color="#FFF9EE"/>
      <stop offset="1" stop-color="#EAF6FF"/>
    </linearGradient>
    <linearGradient id="orb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2F8F62"/>
      <stop offset="1" stop-color="#4C9ED9"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#173C32" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1280" height="520" rx="36" fill="url(#bg)"/>
  <circle cx="1110" cy="65" r="180" fill="#DDF2E6" opacity="0.8"/>
  <circle cx="1190" cy="430" r="220" fill="#DCEEFF" opacity="0.65"/>
  <circle cx="65" cy="510" r="180" fill="#FFE7C4" opacity="0.55"/>
  <g transform="translate(76 82)">
    <rect x="0" y="0" width="166" height="34" rx="17" fill="#DDF2E6"/>
    <text x="83" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#2F8F62" letter-spacing="2">BRAND OPERATING SYSTEM</text>
    <text x="0" y="108" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="52" font-weight="800" fill="#173C32">Tarshar Brand Studio</text>
    <text x="0" y="168" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="34" font-weight="700" fill="#2F8F62">小塔品牌導演 × 小D靈感雷達</text>
    <text x="0" y="220" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="22" fill="#60766F">把課程、文章與教學想法，轉成可持續使用的品牌視覺系統。</text>
    <g transform="translate(0 266)">
      <rect width="126" height="44" rx="22" fill="#FFFFFF" stroke="#CFE0D6"/>
      <text x="63" y="28" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="16" font-weight="700" fill="#173C32">品牌 DNA</text>
      <rect x="142" width="126" height="44" rx="22" fill="#FFFFFF" stroke="#CFE0D6"/>
      <text x="205" y="28" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="16" font-weight="700" fill="#173C32">100組靈感</text>
      <rect x="284" width="126" height="44" rx="22" fill="#FFFFFF" stroke="#CFE0D6"/>
      <text x="347" y="28" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="16" font-weight="700" fill="#173C32">品牌任務單</text>
